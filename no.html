<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Одинокая волна...</title>
    <style>
        body {
            background: linear-gradient(145deg, #98c6e0, #6fa3c2);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
        }
        .card {
            background: rgba(255,248,235,0.9);
            border-radius: 80px 40px 80px 40px;
            padding: 2rem;
            max-width: 450px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(2px);
        }
        h1 { font-size: 2.2rem; color: #1a5777; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; color: #2c698d; margin-bottom: 1.5rem; }
        .btn {
            background: #f4bc7a;
            color: #1e4f6e;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .btn:hover { background: #ffcf93; }
    </style>
</head>
<body>
<div class="card">
    <h1>🧸 Уплыли в разные стороны…</h1>
    <p>Ты выбрала «Нет», но морские бризы всё равно будут ждать.<br>Может, передумаешь?</p>
    <a href="index.html" class="btn">🐚 Вернуться к штурвалу</a>
</div>
</body>
</html>
