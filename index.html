<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Морские выходные с тобой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #b3e0f5 0%, #7fc3e0 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* морские волны сверху и снизу */
        body::before {
            content: "🌊";
            font-size: 80px;
            position: absolute;
            bottom: 10px;
            left: 0;
            opacity: 0.2;
            pointer-events: none;
            white-space: pre;
            width: 100%;
            text-align: center;
            letter-spacing: 20px;
        }
        .card {
            background: rgba(255, 250, 240, 0.92);
            border-radius: 70px 70px 70px 40px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2), inset 0 1px 2px rgba(255,255,200,0.8);
            padding: 2rem 1.8rem;
            max-width: 650px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(4px);
            z-index: 2;
            border: 1px solid rgba(255,245,210,0.8);
        }
        h1 {
            font-size: 2rem;
            color: #1e4a6e;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sub {
            font-size: 1.1rem;
            color: #2c6e9e;
            margin-bottom: 1.8rem;
            font-style: italic;
        }
        .button-area {
            position: relative;
            min-height: 130px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-yes {
            background: #ffb347;
            background: linear-gradient(135deg, #ffb347, #ff8c2e);
            color: #1e3a4d;
            border: none;
            padding: 14px 36px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b45f1b;
            transition: 0.1s linear;
            z-index: 2;
            position: relative;
            font-family: inherit;
        }
        .btn-yes:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #b45f1b;
        }
        .btn-no {
            position: absolute;
            background: #6c8f9c;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e5a64;
            transition: left 0.08s linear, top 0.08s linear;
            white-space: nowrap;
            z-index: 10;
            font-family: inherit;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #317399;
        }
        .anchor-icon {
            font-size: 1.8rem;
        }
        @media (max-width: 550px) {
            .card { padding: 1.5rem; }
            h1 { font-size: 1.6rem; }
            .btn-yes { padding: 12px 24px; font-size: 1.2rem; }
            .btn-no { padding: 10px 22px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>⚓</span> Морское приключение <span>🧜‍♀️</span>
    </h1>
    <div class="sub">выйдем в плавание по нашим выходным?</div>
    <div class="button-area" id="buttonArea">
        <button class="btn-yes" id="yesBtn">💙 Да, поплыли! 💙</button>
        <button class="btn-no" id="noBtn">Нет, не хочу</button>
    </div>
    <footer>🌊 нажми «Да» – и выберем маршрут</footer>
</div>

<script>
    const btnYes = document.getElementById('yesBtn');
    const btnNo = document.getElementById('noBtn');
    const container = document.getElementById('buttonArea');

    function getRandomPos() {
        if (!container || !btnNo) return { left: 0, top: 0 };
        const contRect = container.getBoundingClientRect();
        const btnRect = btnNo.getBoundingClientRect();
        const maxLeft = Math.max(contRect.width - btnRect.width - 15, 20);
        const maxTop = Math.max(contRect.height - btnRect.height - 15, 20);
        if (maxLeft <= 20 || maxTop <= 20) return { left: 10, top: 10 };
        return { left: Math.random() * maxLeft, top: Math.random() * maxTop };
    }

    function moveNo() {
        if (!btnNo) return;
        const { left, top } = getRandomPos();
        btnNo.style.left = left + 'px';
        btnNo.style.top = top + 'px';
    }

    function resetNoPosition() {
        if (!btnNo) return;
        btnNo.style.left = 'auto';
        btnNo.style.top = 'auto';
        setTimeout(() => {
            const contRect = container.getBoundingClientRect();
            const yesRect = btnYes.getBoundingClientRect();
            let leftPos = yesRect.right - contRect.left + 25;
            if (leftPos + (btnNo.offsetWidth || 120) > contRect.width - 10)
                leftPos = contRect.width - (btnNo.offsetWidth || 120) - 10;
            if (leftPos < 10) leftPos = 10;
            btnNo.style.left = leftPos + 'px';
            btnNo.style.top = '10px';
        }, 10);
    }

    btnNo.addEventListener('mouseenter', moveNo);
    btnNo.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveNo();
    });
    btnNo.addEventListener('click', (e) => {
        e.preventDefault();
        moveNo();
        window.location.href = 'no.html';
    });
    btnYes.addEventListener('click', () => window.location.href = 'yes.html');
    window.addEventListener('resize', resetNoPosition);
    resetNoPosition();
</script>
</body>
</html>
